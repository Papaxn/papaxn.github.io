[model]
name = Blog Post
label = {{ this.title }}
hidden = no

[fields.title]
label = Title
type = string

[fields.author]
label = Author
type = string

[fields.pub_date]
label = Publication Date
type = date

[fields.tags]
label = Tags
type = strings

[fields.summary]
label = Summary
type = string

[fields.enable_math]
label = Enable Math (KaTeX)
type = boolean
default = true

[fields.body]
label = Body
type = markdown
